<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NB PROJECT</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; text-align: center; background: #eef2f3; padding: 10px; color: #333; }
        .container { max-width: 450px; margin: 0 auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        #balance { font-size: 40px; font-weight: bold; margin: 10px 0; }
        #gps { color: #7f8c8d; margin-bottom: 15px; }
        .main-btn { padding: 15px; font-size: 20px; cursor: pointer; background: #3498db; color: white; border: none; border-radius: 10px; width: 100%; transition: 0.1s; font-weight: bold; }
        .main-btn:active { transform: scale(0.98); }
        .upgrade-card { background: #f9f9f9; padding: 15px; margin-top: 15px; border-radius: 10px; border: 1px solid #ddd; }
        #buyUpgrade { padding: 10px 20px; cursor: pointer; background: #f39c12; color: white; border: none; border-radius: 5px; }
        #buyUpgrade:disabled { background: #bdc3c7; }
        
        .chat-section { margin-top: 25px; border-top: 2px solid #eee; padding-top: 15px; text-align: left; }
        #chat-box { height: 150px; overflow-y: auto; background: #fefefe; border: 1px solid #eee; padding: 10px; border-radius: 5px; font-size: 13px; margin-bottom: 10px; display: flex; flex-direction: column; }
        .chat-msg { margin-bottom: 5px; border-bottom: 1px solid #f9f9f9; padding-bottom: 2px; word-wrap: break-word; }
        .chat-user { font-weight: bold; color: #2980b9; }
        .chat-input-area { display: flex; gap: 5px; }
        #chat-input { flex-grow: 1; padding: 8px; border: 1px solid #ddd; border-radius: 5px; outline: none; }
        .send-btn { background: #2ecc71; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; }

        #leaderboard-display { text-align: left; background: #fffde7; padding: 10px; border-radius: 8px; font-size: 13px; margin-top: 15px; border: 1px solid #ffe082; }
        .me { color: #e67e22; font-weight: bold; }
        .auth-status { font-size: 12px; color: #7f8c8d; margin-bottom: 10px; font-style: italic; }
        .logout-link { display: inline-block; margin-top: 15px; color: #e74c3c; cursor: pointer; font-size: 12px; text-decoration: underline; }
    </style>
</head>
<body>

<div class="container">
    <h2>NB PROJECT</h2>
    <div class="auth-status" id="user-info">Загрузка...</div>
    
    <div id="balance">0 💰</div>
    <div id="gps">Доход: 0/сек</div>
    
    <button class="main-btn" onclick="clickMoney()">КЛИК! 💸</button>

    <div class="upgrade-card">
        <strong>Улучшение</strong><br>
        <small id="upgrade-info">+1 к доходу в сек</small><br><br>
        <button id="buyUpgrade" onclick="buyUpgrade()">Загрузка...</button>
    </div>

    <div class="chat-section">
        <strong>💬 Общий чат:</strong>
        <div id="chat-box">Загрузка сообщений...</div>
        <div class="chat-input-area">
            <input type="text" id="chat-input" placeholder="Введите сообщение..." maxlength="100">
            <button class="send-btn" onclick="sendChatMessage()">></button>
        </div>
    </div>

    <div id="leaderboard-display">Загрузка ТОПа...</div>
    
    <span class="logout-link" onclick="logout()">Выйти из аккаунта</span>
</div>

<script>
    const SERVER_URL = 'https://nikitosbbarbbos.pythonanywhere.com';
    
    let state = JSON.parse(localStorage.getItem('nb_v4_save')) || { 
        money: 0, 
        upgrades: 0, 
        upgradeCost: 10 
    };
    
    let playerName = localStorage.getItem('nb_v4_name');
    let playerPass = localStorage.getItem('nb_v4_pass');

    function updateUI() {
        document.getElementById('balance').innerText = Math.floor(state.money) + " 💰";
        document.getElementById('gps').innerText = "Доход: " + state.upgrades + "/сек";
        const btn = document.getElementById('buyUpgrade');
        btn.innerText = `Купить за ${state.upgradeCost} 💰`;
        btn.disabled = state.money < state.upgradeCost;
        document.getElementById('user-info').innerText = playerName ? `Вы вошли как: ${playerName}` : "Вход не выполнен";
    }

    function clickMoney() {
        state.money += 1;
        updateUI();
    }

    function buyUpgrade() {
        if (state.money >= state.upgradeCost) {
            state.money -= state.upgradeCost;
            state.upgrades += 1;
            state.upgradeCost = Math.round(state.upgradeCost * 1.15);
            updateUI();
            saveLocal();
        }
    }

    async function login() {
        if (!playerName || !playerPass) {
            const user = prompt("Введите ваш никнейм (регистрация/вход):");
            if (!user) return login();
            const pass = prompt("Введите пароль (запомните его!):");
            if (!pass) return login();
            
            playerName = user.trim();
            playerPass = pass.trim();
            localStorage.setItem('nb_v4_name', playerName);
            localStorage.setItem('nb_v4_pass', playerPass);
            saveOnline();
        }
    }

    async function saveOnline() {
        if (!playerName || !playerPass) return;
        try {
            const r = await fetch(`${SERVER_URL}/save`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    username: playerName, 
                    password: playerPass, 
                    money: Math.floor(state.money) 
                })
            });
            const res = await r.json();
            if (res.error === "wrong_password") {
                alert("Этот ник занят другим паролем!");
                logout();
            }
        } catch (e) {
            console.error("Ошибка синхронизации с сервером");
        }
    }

    async function loadLeaderboard() {
        try {
            const r = await fetch(`${SERVER_URL}/leaderboard`);
            const data = await r.json();
            let html = "<strong>🏆 ТОП 10 Игроков:</strong><br>";
            if (data.length === 0) html += "Пока никого нет...";
            data.forEach(([name, score], i) => {
                const isMe = (name === playerName) ? ' class="me"' : '';
                html += `${i+1}. <span${isMe}>${name}</span> — ${score} 💰<br>`;
            });
            document.getElementById('leaderboard-display').innerHTML = html;
        } catch (e) {
            document.getElementById('leaderboard-display').innerText = "❌ Ошибка загрузки ТОПа";
        }
    }

    async function sendChatMessage() {
        const input = document.getElementById('chat-input');
        const text = input.value.trim();
        if (!text || !playerName) return;

        try {
            const r = await fetch(`${SERVER_URL}/send_chat`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    username: playerName, 
                    password: playerPass, 
                    message: text 
                })
            });
            if (r.ok) {
                input.value = "";
                loadChat();
            }
        } catch (e) {}
    }

    async function loadChat() {
        try {
            const r = await fetch(`${SERVER_URL}/get_chat`);
            const data = await r.json();
            const box = document.getElementById('chat-box');
            if (data.length === 0) {
                box.innerHTML = "Сообщений нет...";
            } else {
                box.innerHTML = data.map(m => `
                    <div class="chat-msg">
                        <span class="chat-user">${m.user}:</span> ${m.text}
                    </div>
                `).join('');
            }
            box.scrollTop = box.scrollHeight;
        } catch (e) {}
    }

    function saveLocal() {
        localStorage.setItem('nb_v4_save', JSON.stringify(state));
    }

    function logout() {
        localStorage.clear();
        location.reload();
    }

    // Слушатель Enter для чата
    document.getElementById('chat-input').addEventListener('keydown', function(e) {
        if (e.key === 'Enter') {
            sendChatMessage();
        }
    });

    // Таймеры
    setInterval(() => {
        state.money += state.upgrades / 10;
        updateUI();
    }, 100);

    setInterval(saveLocal, 5000);
    setInterval(loadLeaderboard, 10000);
    setInterval(loadChat, 3000);
    setInterval(saveOnline, 20000);

    // Запуск
    if (!playerName) login();
    updateUI();
    loadLeaderboard();
    loadChat();
</script>

</body>
</html>
