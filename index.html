<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NB PROJECT</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; text-align: center; background: #eef2f3; padding: 10px; color: #333; }
        .container { max-width: 450px; margin: 0 auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        #balance { font-size: 40px; font-weight: bold; margin: 10px 0; }
        .main-btn { padding: 15px; font-size: 20px; cursor: pointer; background: #3498db; color: white; border: none; border-radius: 10px; width: 100%; transition: 0.1s; }
        .main-btn:active { transform: scale(0.98); }
        .upgrade-card { background: #f9f9f9; padding: 10px; margin-top: 15px; border-radius: 10px; border: 1px solid #ddd; }
        .chat-section { margin-top: 25px; border-top: 2px solid #eee; padding-top: 15px; text-align: left; }
        #chat-box { height: 150px; overflow-y: auto; background: #fefefe; border: 1px solid #eee; padding: 10px; border-radius: 5px; font-size: 13px; margin-bottom: 10px; display: flex; flex-direction: column; }
        .chat-msg { margin-bottom: 5px; border-bottom: 1px solid #f1f1f1; padding-bottom: 2px; }
        .chat-user { font-weight: bold; color: #2980b9; }
        .chat-input-area { display: flex; gap: 5px; }
        #chat-input { flex-grow: 1; padding: 8px; border: 1px solid #ddd; border-radius: 5px; outline: none; }
        .send-btn { background: #2ecc71; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; }
        #leaderboard-display { text-align: left; background: #fffde7; padding: 10px; border-radius: 8px; font-size: 13px; margin-top: 15px; }
        .me { color: #e67e22; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>NB PROJECT</h2>
    <div id="balance">0 💰</div>
    <div id="gps">Доход: 0/сек</div>
    <button class="main-btn" onclick="clickMoney()">КЛИК! 💸</button>

    <div class="upgrade-card">
        <strong>Авто-кликер</strong> (+1/сек) <br>
        <button id="buyUpgrade" onclick="buyUpgrade()" style="margin-top:5px;">Купить за 10 💰</button>
    </div>

    <div class="chat-section">
        <strong>💬 Чат:</strong>
        <div id="chat-box"></div>
        <div class="chat-input-area">
            <input type="text" id="chat-input" placeholder="Текст..." maxlength="100">
            <button class="send-btn" onclick="sendChatMessage()">></button>
        </div>
    </div>

    <div id="leaderboard-display"></div>
    <br>
    <small onclick="renamePlayer()" style="text-decoration:underline; cursor:pointer; color:#7f8c8d;">Сменить ник</small>
</div>

<script>
    const SERVER_URL = 'https://nikitosbbarbbos.pythonanywhere.com';
    let state = JSON.parse(localStorage.getItem('nb_v3_save')) || { money: 0, upgrades: 0, upgradeCost: 10 };
    let playerName = localStorage.getItem('nb_v3_name') || null;

    function updateUI() {
        document.getElementById('balance').innerText = Math.floor(state.money) + " 💰";
        document.getElementById('gps').innerText = "Доход: " + state.upgrades + "/сек";
        const btn = document.getElementById('buyUpgrade');
        btn.innerText = `Купить за ${state.upgradeCost} 💰 (У вас: ${state.upgrades})`;
        btn.disabled = state.money < state.upgradeCost;
    }

    function clickMoney() { state.money++; updateUI(); }

    function buyUpgrade() {
        if (state.money >= state.upgradeCost) {
            state.money -= state.upgradeCost;
            state.upgrades++;
            state.upgradeCost = Math.round(state.upgradeCost * 1.15);
            updateUI();
        }
    }

    async function saveOnline() {
        if (!playerName) {
            playerName = prompt("Ник:");
            if (!playerName) return;
            localStorage.setItem('nb_v3_name', playerName);
        }
        try {
            await fetch(`${SERVER_URL}/save`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: playerName, money: Math.floor(state.money) })
            });
        } catch (e) {}
    }

    async function loadLeaderboard() {
        try {
            const r = await fetch(`${SERVER_URL}/leaderboard`);
            const data = await r.json();
            let html = "<strong>🏆 ТОП 10:</strong><br>";
            data.forEach(([name, score], i) => {
                html += `${i+1}. <span class="${name===playerName?'me':''}">${name}</span> — ${score} 💰<br>`;
            });
            document.getElementById('leaderboard-display').innerHTML = html;
        } catch (e) {}
    }

    async function sendChatMessage() {
        const input = document.getElementById('chat-input');
        const msg = input.value.trim();
        if (!msg) return;
        if (!playerName) { await saveOnline(); if(!playerName) return; }
        try {
            await fetch(`${SERVER_URL}/send_chat`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: playerName, message: msg })
            });
            input.value = "";
            loadChat();
        } catch (e) {}
    }

    async function loadChat() {
        try {
            const r = await fetch(`${SERVER_URL}/get_chat`);
            const data = await r.json();
            const box = document.getElementById('chat-box');
            box.innerHTML = data.map(m => `
                <div class="chat-msg">
                    <span class="chat-user">${m.user}:</span> ${m.text}
                </div>
            `).join('');
            box.scrollTop = box.scrollHeight;
        } catch (e) {}
    }

    function renamePlayer() {
        const n = prompt("Ник:", playerName || "");
        if(n) { playerName = n; localStorage.setItem('nb_v3_name', n); saveOnline(); }
    }

    document.getElementById('chat-input').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') sendChatMessage();
    });

    setInterval(() => { state.money += state.upgrades/10; updateUI(); }, 100);
    setInterval(() => localStorage.setItem('nb_v3_save', JSON.stringify(state)), 5000);
    setInterval(loadLeaderboard, 10000);
    setInterval(loadChat, 3000);
    setInterval(saveOnline, 30000);

    updateUI();
    loadLeaderboard();
    loadChat();
</script>

</body>
</html>
