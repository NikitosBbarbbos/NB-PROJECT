<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NB PROJECT</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; background: #eef2f3; padding: 20px; color: #333; }
        .container { max-width: 500px; margin: 0 auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        #balance { font-size: 48px; font-weight: bold; color: #2c3e50; margin: 20px 0; }
        #gps { color: #7f8c8d; margin-bottom: 20px; }
        .main-btn { 
            padding: 20px 40px; font-size: 22px; cursor: pointer; 
            background: #3498db; color: white; border: none; border-radius: 10px; 
            transition: transform 0.1s, background 0.2s; width: 100%;
        }
        .main-btn:active { transform: scale(0.95); }
        .main-btn:hover { background: #2980b9; }
        .shop { margin-top: 30px; display: grid; gap: 15px; }
        .upgrade-card { background: #f9f9f9; padding: 15px; border-radius: 10px; border: 1px solid #ddd; }
        button:disabled { background: #bdc3c7 !important; cursor: not-allowed; }
        .online-section { margin-top: 40px; padding-top: 20px; border-top: 2px solid #eee; }
        .cloud-btn { background: #2ecc71; padding: 10px 15px; color: white; border: none; border-radius: 5px; cursor: pointer; margin: 5px; font-size: 14px; }
        .rename-link { display: block; margin-top: 10px; color: #7f8c8d; cursor: pointer; font-size: 12px; text-decoration: underline; }
        #leaderboard-display { margin-top: 20px; text-align: left; background: #fffde7; padding: 15px; border-radius: 8px; font-size: 14px; line-height: 1.6; }
        .me { color: #e67e22; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>NB PROJECT</h1>
    <div id="balance">0 💰</div>
    <div id="gps">Доход: 0/сек</div>
    
    <button class="main-btn" onclick="clickMoney()">КЛИК! 💸</button>

    <div class="shop">
        <div class="upgrade-card">
            <strong>Авто-кликер</strong> (+1/сек)
            <br>
            <button id="buyUpgrade" onclick="buyUpgrade()">Купить за 10 💰</button>
            <div id="upgradeCount">У вас: 0</div>
        </div>
    </div>

    <div class="online-section">
        <button class="cloud-btn" onclick="saveOnline()">☁️ Сохранить сейчас</button>
        <div id="leaderboard-display">Синхронизация...</div>
        <span class="rename-link" onclick="renamePlayer()">Сменить имя игрока</span>
    </div>
</div>

<script>
    const SERVER_URL = 'https://nikitosbbarbbos.pythonanywhere.com';

    let state = JSON.parse(localStorage.getItem('nb_project_save')) || {
        money: 0,
        upgrades: 0,
        upgradeCost: 10
    };

    let playerName = localStorage.getItem('nb_player_name') || null;

    const balanceEl = document.getElementById('balance');
    const gpsEl = document.getElementById('gps');
    const upgradeBtn = document.getElementById('buyUpgrade');
    const upgradeCountEl = document.getElementById('upgradeCount');
    const lbDisplay = document.getElementById('leaderboard-display');

    function updateUI() {
        balanceEl.innerText = Math.floor(state.money) + " 💰";
        gpsEl.innerText = "Доход: " + state.upgrades + "/сек";
        upgradeBtn.innerText = `Купить за ${state.upgradeCost} 💰`;
        upgradeCountEl.innerText = `У вас: ${state.upgrades}`;
        upgradeBtn.disabled = state.money < state.upgradeCost;
    }

    function clickMoney() {
        state.money += 1;
        updateUI();
    }

    function buyUpgrade() {
        if (state.money >= state.upgradeCost) {
            state.money -= state.upgradeCost;
            state.upgrades += 1;
            state.upgradeCost = Math.round(state.upgradeCost * 1.15);
            updateUI();
            saveLocal();
        }
    }

    async function saveOnline() {
        if (!playerName) {
            playerName = prompt("Ваш никнейм:");
            if (!playerName) return;
            localStorage.setItem('nb_player_name', playerName);
        }

        try {
            await fetch(`${SERVER_URL}/save`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    username: playerName,
                    money: Math.floor(state.money)
                })
            });
            loadLeaderboard();
        } catch (e) {
            console.error("Cloud Save Failed");
        }
    }

    async function loadLeaderboard() {
        try {
            const response = await fetch(`${SERVER_URL}/leaderboard`);
            const data = await response.json();
            
            let html = "<strong>🏆 ТОП Игроков:</strong><br>";
            if (!data || data.length === 0) {
                html += "Список пуст";
            } else {
                data.forEach(([name, score], index) => {
                    const isMe = (name === playerName) ? '<span class="me"> (ВЫ)</span>' : '';
                    html += `${index + 1}. ${name}${isMe} — ${score} 💰<br>`;
                });
            }
            lbDisplay.innerHTML = html;
        } catch (e) {
            lbDisplay.innerHTML = "❌ Ошибка сети (попробуйте другой браузер)";
        }
    }

    function renamePlayer() {
        const newName = prompt("Новое имя:", playerName || "");
        if (newName) {
            playerName = newName;
            localStorage.setItem('nb_player_name', playerName);
            saveOnline();
        }
    }

    function saveLocal() {
        localStorage.setItem('nb_project_save', JSON.stringify(state));
    }

    setInterval(() => {
        state.money += state.upgrades;
        updateUI();
    }, 1000);

    setInterval(saveLocal, 5000);
    setInterval(loadLeaderboard, 10000);
    setInterval(() => { if (playerName) saveOnline(); }, 30000);

    loadLeaderboard();
    updateUI();
</script>

</body>
</html>
