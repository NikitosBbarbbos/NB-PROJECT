<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NB PROJECT: MONOPOLY EDITION</title>
    <style>
        :root {
            --bg-blue: #22a6f0;
            --board-green: #cde6d0;
            --border-dark: #333;
        }

        body { 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            background: var(--bg-blue); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0;
            padding: 20px 0;
            color: #333;
        }

        .monopoly-board {
            width: 450px;
            background: var(--board-green);
            border: 4px solid var(--border-dark);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 20px 0 #1565c0, 0 30px 50px rgba(0,0,0,0.3);
        }

        #user-info {
            background: white;
            border: 2px solid var(--border-dark);
            padding: 5px 15px;
            border-radius: 50px;
            font-weight: bold;
            margin-bottom: 15px;
            box-shadow: 0 4px 0 #ddd;
            display: inline-block;
        }

        .money-display {
            background: #fff;
            border: 3px solid var(--border-dark);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 20px;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.1);
            text-align: center;
        }

        #balance {
            font-size: 45px;
            font-weight: 900;
            color: #27ae60;
            text-shadow: 2px 2px 0 #fff, 3px 3px 0 rgba(0,0,0,0.1);
        }

        #multiplier-display {
            font-size: 14px;
            color: #8e44ad;
            font-weight: bold;
            margin-top: 5px;
        }

        .main-btn-container { text-align: center; margin-bottom: 25px; }

        .main-btn {
            width: 110px;
            height: 110px;
            background: #e74c3c;
            border: 4px solid var(--border-dark);
            border-radius: 50%;
            cursor: pointer;
            font-size: 22px;
            font-weight: bold;
            color: white;
            box-shadow: 0 8px 0 #c0392b, 0 15px 25px rgba(0,0,0,0.2);
            transition: 0.1s;
        }

        .main-btn:active { transform: translateY(4px); box-shadow: 0 4px 0 #c0392b; }

        .shop-grid { display: grid; gap: 15px; margin-bottom: 20px; }

        .upgrade-card {
            background: white;
            border: 3px solid var(--border-dark);
            border-radius: 10px;
            padding: 15px;
            box-shadow: 0 6px 0 #ddd;
            text-align: center;
        }

        .upgrade-header {
            margin: -15px -15px 10px -15px;
            padding: 8px;
            border-bottom: 3px solid var(--border-dark);
            font-weight: bold;
            text-transform: uppercase;
        }

        .header-auto { background: #f39c12; }
        .header-farm { background: #3498db; color: white; }
        .header-rebirth { background: #9b59b6; color: white; }

        .buy-btn {
            background: #2ecc71;
            border: 2px solid var(--border-dark);
            padding: 8px 15px;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 0 #27ae60;
            width: 100%;
        }

        .buy-btn:disabled { background: #bdc3c7; box-shadow: none; cursor: default; }
        .rebirth-btn { background: #f1c40f; box-shadow: 0 4px 0 #f39c12; color: #333; }

        .chat-container { margin-top: 25px; }
        #chat-box { height: 120px; background: rgba(255,255,255,0.8); border: 2px solid var(--border-dark); border-radius: 10px; padding: 10px; overflow-y: auto; font-size: 13px; margin-bottom: 10px; }
        .chat-input-area { display: flex; gap: 5px; }
        #chat-input { flex-grow: 1; border: 2px solid var(--border-dark); border-radius: 5px; padding: 8px; outline: none; }
        .send-btn { border: 2px solid var(--border-dark); background: #fff; cursor:pointer; border-radius:5px; padding: 0 15px; font-weight:bold; }

        .leaderboard { background: #ffeb3b; border: 2px solid var(--border-dark); border-radius: 10px; padding: 10px; margin-top: 20px; font-size: 14px; }
        .me { color: #d35400; text-decoration: underline; font-weight: bold; }
        .logout { margin-top: 15px; cursor: pointer; font-size: 12px; color: #666; display: block; text-align: center; }
        
        .rebirth-badge { color: #8e44ad; font-weight: bold; }
    </style>
</head>
<body>

<div class="monopoly-board">
    <div style="text-align: center;">
        <div id="user-info">ВХОД...</div>
    </div>
    
    <div class="money-display">
        <div id="balance">0 💰</div>
        <div id="gps">ДОХОД: 0/СЕК</div>
        <div id="multiplier-display">МНОЖИТЕЛЬ: x1</div>
    </div>
    
    <div class="main-btn-container">
        <button class="main-btn" onclick="clickMoney()">GO!</button>
    </div>

    <div class="shop-grid">
        <div class="upgrade-card">
            <div class="upgrade-header header-auto">Ларёк</div>
            <p style="font-size: 12px; margin: 5px 0;">+1 к базовому доходу</p>
            <button id="buyAuto" class="buy-btn" onclick="buyAuto()">КУПИТЬ</button>
        </div>

        <div class="upgrade-card">
            <div class="upgrade-header header-farm">Крупная Ферма</div>
            <p style="font-size: 12px; margin: 5px 0;">+10 к базовому доходу</p>
            <button id="buyFarm" class="buy-btn" onclick="buyFarm()">КУПИТЬ</button>
        </div>

        <div class="upgrade-card">
            <div class="upgrade-header header-rebirth">Перераспределение</div>
            <p style="font-size: 11px; margin: 5px 0; color: #555;">Перераспределите свои ресурсы и получите множитель ко всему доходу(сброс прогресса)</p>
            <button id="buyRebirth" class="buy-btn rebirth-btn" onclick="doRebirth()">ЗАГРУЗКА...</button>
        </div>
    </div>

    <div class="chat-container">
        <div id="chat-box"></div>
        <div class="chat-input-area">
            <input type="text" id="chat-input" placeholder="Чат игры..." maxlength="50">
            <button class="send-btn" onclick="sendChatMessage()">></button>
        </div>
    </div>

    <div id="leaderboard-display" class="leaderboard"></div>
    
    <span class="logout" onclick="logout()">ВЫЙТИ ИЗ АККАУНТА</span>
</div>

<script>
    const SERVER_URL = 'https://nikitosbbarbbos.pythonanywhere.com';
    
    let saved = JSON.parse(localStorage.getItem('nb_v5_save'));
    if (!saved) {
        let oldSave = JSON.parse(localStorage.getItem('nb_v4_save'));
        if (oldSave) {
            saved = {
                money: oldSave.money || 0,
                upgrades: oldSave.upgrades || 0,
                upgradeCost: oldSave.upgradeCost || 10,
                farms: 0,
                farmCost: 100,
                rebirth: 0,
                multiplier: 1
            };
        }
    }

    let state = saved || { 
        money: 0, 
        upgrades: 0, 
        upgradeCost: 10,
        farms: 0,
        farmCost: 100,
        rebirth: 0,
        multiplier: 1
    };
    
    let playerName = localStorage.getItem('nb_v5_name') || localStorage.getItem('nb_v4_name');
    let playerPass = localStorage.getItem('nb_v5_pass') || localStorage.getItem('nb_v4_pass');
    
    // Синхронизируем имена для v5
    if (playerName) localStorage.setItem('nb_v5_name', playerName);
    if (playerPass) localStorage.setItem('nb_v5_pass', playerPass);

    const REBIRTH_TIERS = [
        { cost: 50000, mult: 3, label: "x3 МНОЖИТЕЛЬ" },
        { cost: 1000000, mult: 5, label: "x5 МНОЖИТЕЛЬ" },
        { cost: 15000000, mult: 2, label: "x2 МНОЖИТЕЛЬ" }
    ];

    function getIncome() {
        return (state.upgrades * 1 + state.farms * 10) * state.multiplier;
    }

    function updateUI() {
        document.getElementById('balance').innerText = Math.floor(state.money) + " 💰";
        document.getElementById('gps').innerText = "ДОХОД: " + getIncome().toFixed(1) + "/СЕК";
        document.getElementById('multiplier-display').innerText = `МНОЖИТЕЛЬ: x${state.multiplier} (Уровень: ${state.rebirth})`;
        
        const btnAuto = document.getElementById('buyAuto');
        btnAuto.innerText = `${state.upgradeCost} 💰 (У вас: ${state.upgrades})`;
        btnAuto.disabled = state.money < state.upgradeCost;

        const btnFarm = document.getElementById('buyFarm');
        btnFarm.innerText = `${state.farmCost} 💰 (У вас: ${state.farms})`;
        btnFarm.disabled = state.money < state.farmCost;

        const btnRebirth = document.getElementById('buyRebirth');
        let nextTier = REBIRTH_TIERS[state.rebirth];
        if (nextTier) {
            btnRebirth.innerText = `ЦЕНА: ${nextTier.cost} 💰 (${nextTier.label})`;
            btnRebirth.disabled = state.money < nextTier.cost;
        } else {
            btnRebirth.innerText = "МАКСИМАЛЬНЫЙ УРОВЕНЬ!";
            btnRebirth.disabled = true;
        }

        let rbText = state.rebirth > 0 ? ` [⭐${state.rebirth}]` : "";
        document.getElementById('user-info').innerText = playerName ? `ИГРОК: ${playerName}${rbText}` : "ВХОД...";
    }

    function clickMoney() { 
        state.money += (1 * state.multiplier); 
        updateUI(); 
    }

    function buyAuto() {
        if (state.money >= state.upgradeCost) {
            state.money -= state.upgradeCost;
            state.upgrades += 1;
            state.upgradeCost = Math.round(state.upgradeCost * 1.15);
            updateUI();
            saveLocal();
        }
    }

    function buyFarm() {
        if (state.money >= state.farmCost) {
            state.money -= state.farmCost;
            state.farms += 1;
            state.farmCost = Math.round(state.farmCost * 1.15);
            updateUI();
            saveLocal();
        }
    }

    function doRebirth() {
        let nextTier = REBIRTH_TIERS[state.rebirth];
        if (nextTier && state.money >= nextTier.cost) {
            if (confirm(`Выйти на IPO? Вы потеряете все накопления, но множитель увеличится на ${nextTier.mult} навсегда!`)) {
                state.multiplier *= nextTier.mult;
                state.rebirth += 1;
                state.money = 0;
                state.upgrades = 0;
                state.upgradeCost = 10;
                state.farms = 0;
                state.farmCost = 100;
                
                updateUI();
                saveLocal();
                saveOnline();
                alert("Успешно! Новый множитель: x" + state.multiplier);
            }
        }
    }

    async function login() {
        if (!playerName || !playerPass) {
            const user = prompt("ВАШ НИКНЕЙМ:");
            const pass = prompt("ПАРОЛЬ:");
            if (user && pass) {
                playerName = user.trim();
                playerPass = pass.trim();
                localStorage.setItem('nb_v5_name', playerName);
                localStorage.setItem('nb_v5_pass', playerPass);
                saveOnline();
            } else { login(); }
        }
    }

    async function saveOnline() {
        if (!playerName || !playerPass) return;
        try {
            const r = await fetch(`${SERVER_URL}/save`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    username: playerName, 
                    password: playerPass, 
                    money: Math.floor(state.money),
                    rebirth: state.rebirth
                })
            });
            const res = await r.json();
            if (res.error === "wrong_password") { 
                alert("Ошибка авторизации!"); 
                logout(); 
            }
        } catch (e) {}
    }

    async function loadLeaderboard() {
        try {
            const r = await fetch(`${SERVER_URL}/leaderboard`);
            const data = await r.json();
            let html = "<b>🏆 ТОП МОНОПОЛИСТОВ:</b><br>";
            data.forEach(([name, score, rb], i) => {
                let rbBadge = rb > 0 ? `<span class="rebirth-badge">⭐${rb}</span>` : "";
                let isMeClass = (name === playerName) ? ' class="me"' : '';
                html += `${i+1}. <span${isMeClass}>${name}</span> ${rbBadge}: ${score} 💰<br>`;
            });
            document.getElementById('leaderboard-display').innerHTML = html;
        } catch (e) {}
    }

    async function sendChatMessage() {
        const input = document.getElementById('chat-input');
        if (!input.value.trim() || !playerName) return;
        try {
            await fetch(`${SERVER_URL}/send_chat`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: playerName, password: playerPass, message: input.value })
            });
            input.value = "";
            loadChat();
        } catch (e) {}
    }

    async function loadChat() {
        try {
            const r = await fetch(`${SERVER_URL}/get_chat`);
            const data = await r.json();
            const box = document.getElementById('chat-box');
            box.innerHTML = data.map(m => `<div><b>${m.user}:</b> ${m.text}</div>`).join('');
            box.scrollTop = box.scrollHeight;
        } catch (e) {}
    }

    function saveLocal() { localStorage.setItem('nb_v5_save', JSON.stringify(state)); }
    function logout() { localStorage.clear(); location.reload(); }

    document.getElementById('chat-input').addEventListener('keydown', (e) => { if (e.key === 'Enter') sendChatMessage(); });

    setInterval(() => { 
        state.money += getIncome() / 10; 
        updateUI(); 
    }, 100);

    setInterval(saveLocal, 5000);
    setInterval(loadLeaderboard, 10000);
    setInterval(loadChat, 3000);
    setInterval(saveOnline, 20000);

    if (!playerName) login();
    updateUI();
    loadLeaderboard();
    loadChat();
</script>

</body>
</html>
