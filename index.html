<script>
    const SERVER_URL = 'https://nikitosbbarbbos.pythonanywhere.com';
    let state = JSON.parse(localStorage.getItem('nb_v4_save')) || { money: 0, upgrades: 0, upgradeCost: 10 };
    let playerName = localStorage.getItem('nb_v4_name');
    let playerPass = localStorage.getItem('nb_v4_pass');

    function updateUI() {
        document.getElementById('balance').innerText = Math.floor(state.money) + " 💰";
        document.getElementById('gps').innerText = "Доход: " + state.upgrades + "/сек";
        const btn = document.getElementById('buyUpgrade');
        btn.innerText = `Купить Авто-кликер за ${state.upgradeCost} 💰`;
        btn.disabled = state.money < state.upgradeCost;
        document.getElementById('user-info').innerText = playerName ? `Игрок: ${playerName}` : "Вход не выполнен";
    }

    function clickMoney() { state.money++; updateUI(); }

    function buyUpgrade() {
        if (state.money >= state.upgradeCost) {
            state.money -= state.upgradeCost;
            state.upgrades++;
            state.upgradeCost = Math.round(state.upgradeCost * 1.15);
            updateUI();
        }
    }

    async function login() {
        if (!playerName || !playerPass) {
            const user = prompt("Введите ник:");
            const pass = prompt("Введите пароль:");
            if (user && pass) {
                playerName = user;
                playerPass = pass;
                localStorage.setItem('nb_v4_name', user);
                localStorage.setItem('nb_v4_pass', pass);
                saveOnline();
            }
        }
    }

    async function saveOnline() {
        if (!playerName || !playerPass) return;
        try {
            const r = await fetch(`${SERVER_URL}/save`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    username: playerName, 
                    password: playerPass, 
                    money: Math.floor(state.money) 
                })
            });
            const res = await r.json();
            if (res.error === "wrong_password") {
                alert("Неверный пароль для этого ника!");
                logout();
            }
        } catch (e) {}
    }

    async function loadLeaderboard() {
        try {
            const r = await fetch(`${SERVER_URL}/leaderboard`);
            const data = await r.json();
            let html = "<strong>🏆 ТОП 10:</strong><br>";
            data.forEach(([name, score], i) => {
                html += `${i+1}. <span class="${name===playerName?'me':''}">${name}</span> — ${score} 💰<br>`;
            });
            document.getElementById('leaderboard-display').innerHTML = html;
        } catch (e) {}
    }

    async function sendChatMessage() {
        const input = document.getElementById('chat-input');
        const text = input.value.trim();
        if (!text || !playerName) return;
        try {
            await fetch(`${SERVER_URL}/send_chat`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    username: playerName, 
                    password: playerPass, 
                    message: text 
                })
            });
            input.value = "";
            loadChat();
        } catch (e) {}
    }

    async function loadChat() {
        try {
            const r = await fetch(`${SERVER_URL}/get_chat`);
            const data = await r.json();
            const box = document.getElementById('chat-box');
            box.innerHTML = data.map(m => `<div class="chat-msg"><span class="chat-user">${m.user}:</span> ${m.text}</div>`).join('');
            box.scrollTop = box.scrollHeight;
        } catch (e) {}
    }

    function logout() {
        localStorage.clear();
        location.reload();
    }

    // Слушатель Enter для чата
    document.getElementById('chat-input').addEventListener('keydown', function(e) {
        if (e.key === 'Enter') {
            sendChatMessage();
        }
    });

    setInterval(() => { state.money += state.upgrades/10; updateUI(); }, 100);
    setInterval(() => localStorage.setItem('nb_v4_save', JSON.stringify(state)), 5000);
    setInterval(loadLeaderboard, 10000);
    setInterval(loadChat, 3000);
    setInterval(saveOnline, 20000);

    if (!playerName) login();
    updateUI();
    loadLeaderboard();
    loadChat();
</script>
