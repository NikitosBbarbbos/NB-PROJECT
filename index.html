<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NB PROJECT: MONOPOLY EDITION</title>
    <style>
        :root {
            --bg-blue: #22a6f0;
            --board-green: #cde6d0;
            --border-dark: #333;
        }

        body { 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            background: var(--bg-blue); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0;
            padding: 20px 0;
            color: #333;
            overflow-x: hidden;
        }

        .monopoly-board {
            width: 450px;
            background: var(--board-green);
            border: 4px solid var(--border-dark);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 20px 0 #1565c0, 0 30px 50px rgba(0,0,0,0.3);
            position: relative;
        }

        #user-info {
            background: white;
            border: 2px solid var(--border-dark);
            padding: 5px 15px;
            border-radius: 50px;
            font-weight: bold;
            margin-bottom: 15px;
            box-shadow: 0 4px 0 #ddd;
            display: inline-block;
        }

        .money-display {
            background: #fff;
            border: 3px solid var(--border-dark);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 20px;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.1);
            text-align: center;
        }

        #balance {
            font-size: 45px;
            font-weight: 900;
            color: #27ae60;
            text-shadow: 2px 2px 0 #fff, 3px 3px 0 rgba(0,0,0,0.1);
        }

        #multiplier-display {
            font-size: 14px;
            color: #8e44ad;
            font-weight: bold;
            margin-top: 5px;
        }

        .main-btn-container { text-align: center; margin-bottom: 25px; position: relative; }

        .main-btn {
            width: 110px;
            height: 110px;
            background: #e74c3c;
            border: 4px solid var(--border-dark);
            border-radius: 50%;
            cursor: pointer;
            font-size: 22px;
            font-weight: bold;
            color: white;
            box-shadow: 0 8px 0 #c0392b, 0 15px 25px rgba(0,0,0,0.2);
            transition: transform 0.1s, box-shadow 0.1s;
        }

        .main-btn:active { transform: translateY(4px); box-shadow: 0 4px 0 #c0392b; }

        .shop-grid { display: grid; gap: 15px; margin-bottom: 20px; }

        .upgrade-card {
            background: white;
            border: 3px solid var(--border-dark);
            border-radius: 10px;
            padding: 15px;
            box-shadow: 0 6px 0 #ddd;
            text-align: center;
            transition: transform 0.15s ease;
        }

        .pulse-anim { transform: scale(0.95); box-shadow: 0 2px 0 #ddd; }

        .upgrade-header {
            margin: -15px -15px 10px -15px;
            padding: 8px;
            border-bottom: 3px solid var(--border-dark);
            font-weight: bold;
            text-transform: uppercase;
        }

        .header-auto { background: #f39c12; }
        .header-farm { background: #3498db; color: white; }
        .header-rebirth { background: #9b59b6; color: white; }

        .buy-btn {
            background: #2ecc71;
            border: 2px solid var(--border-dark);
            padding: 8px 15px;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 0 #27ae60;
            width: 100%;
            transition: background 0.2s;
        }

        .buy-btn:disabled { background: #bdc3c7; box-shadow: none; cursor: default; }
        .buy-btn:not(:disabled):active { transform: translateY(2px); box-shadow: 0 2px 0 #27ae60; }
        .rebirth-btn { background: #f1c40f; box-shadow: 0 4px 0 #f39c12; color: #333; }
        .rebirth-btn:not(:disabled):active { box-shadow: 0 2px 0 #f39c12; }

        .chat-container { margin-top: 25px; }
        #chat-box { height: 120px; background: rgba(255,255,255,0.8); border: 2px solid var(--border-dark); border-radius: 10px; padding: 10px; overflow-y: auto; font-size: 13px; margin-bottom: 10px; overflow-x: hidden; }
        
        .chat-msg { animation: slideInMsg 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); margin-bottom: 4px; }
        @keyframes slideInMsg { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }
        
        .chat-input-area { display: flex; gap: 5px; }
        #chat-input { flex-grow: 1; border: 2px solid var(--border-dark); border-radius: 5px; padding: 8px; outline: none; transition: border-color 0.2s;}
        #chat-input:focus { border-color: #2ecc71; }
        .send-btn { border: 2px solid var(--border-dark); background: #fff; cursor:pointer; border-radius:5px; padding: 0 15px; font-weight:bold; transition: background 0.2s; }
        .send-btn:active { background: #eee; }

        .leaderboard-wrapper { background: #ffeb3b; border: 2px solid var(--border-dark); border-radius: 10px; margin-top: 20px; font-size: 14px; overflow: hidden; }
        .leaderboard-header { padding: 10px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid transparent; }
        .leaderboard-header.active-border { border-bottom: 2px solid var(--border-dark); }
        .toggle-btn { background: white; border: 2px solid var(--border-dark); border-radius: 5px; font-size: 11px; cursor: pointer; padding: 3px 8px; font-weight: bold; }
        #leaderboard-display { padding: 0 10px 10px 10px; display: block; }
        
        .lb-item { padding: 4px 5px; border-radius: 5px; transition: background-color 0.5s; margin-bottom: 2px; }
        .rank-up { animation: flashGreen 2s ease-out; }
        @keyframes flashGreen { 0% { background-color: #2ecc71; color: white; transform: scale(1.02); } 100% { background-color: transparent; color: inherit; transform: scale(1); } }

        .me { color: #d35400; text-decoration: underline; font-weight: bold; }
        .logout { margin-top: 15px; cursor: pointer; font-size: 12px; color: #666; display: block; text-align: center; }
        .rebirth-badge { color: #8e44ad; font-weight: bold; }

        .floating-text {
            position: fixed;
            font-weight: 900;
            font-size: 22px;
            pointer-events: none;
            text-shadow: 2px 2px 0 #fff, -1px -1px 0 #fff, 1px -1px 0 #fff, -1px 1px 0 #fff, 1px 1px 0 #fff;
            z-index: 1000;
            animation: floatUp 1s ease-out forwards;
        }
        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0) scale(1); }
            100% { opacity: 0; transform: translateY(-60px) scale(1.2); }
        }

        /* --- ADMIN CONSOLE STYLES --- */
        #admin-panel { 
            display:none; 
            margin-top: 15px; 
            padding: 12px; 
            border: 3px dashed #e74c3c; 
            background: #fff; 
            border-radius: 10px;
            text-align: center;
        }
        .admin-title { color: #e74c3c; font-weight: bold; font-size: 14px; margin-bottom: 8px; display: block; }
        .admin-controls { display: flex; gap: 5px; justify-content: center; }
        .admin-input { width: 80px; border: 2px solid var(--border-dark); border-radius: 5px; padding: 5px; }
        .admin-btn { background: #e74c3c; color: white; border: 2px solid var(--border-dark); border-radius: 5px; cursor: pointer; padding: 5px 10px; font-weight: bold; font-size: 11px; }
        .admin-btn.alt { background: #9b59b6; }
    </style>
</head>
<body>

<div class="monopoly-board">
    <div style="text-align: center;">
        <div id="user-info">ВХОД...</div>
    </div>
    
    <div class="money-display">
        <div id="balance">0 💰</div>
        <div id="gps">ДОХОД: 0/СЕК</div>
        <div id="multiplier-display">МНОЖИТЕЛЬ: x1</div>
    </div>
    
    <div class="main-btn-container">
        <button class="main-btn" onclick="clickMoney(event)">GO!</button>
    </div>

    <div class="shop-grid">
        <div class="upgrade-card" id="card-auto">
            <div class="upgrade-header header-auto">Ларёк</div>
            <p style="font-size: 12px; margin: 5px 0;">+1 к базовому доходу</p>
            <button id="buyAuto" class="buy-btn" onclick="buyAuto(event)">КУПИТЬ</button>
        </div>

        <div class="upgrade-card" id="card-farm">
            <div class="upgrade-header header-farm">Крупная Ферма</div>
            <p style="font-size: 12px; margin: 5px 0;">+10 к базовому доходу</p>
            <button id="buyFarm" class="buy-btn" onclick="buyFarm(event)">КУПИТЬ</button>
        </div>

        <div class="upgrade-card" id="card-rebirth">
            <div class="upgrade-header header-rebirth">Перераспределение</div>
            <p style="font-size: 11px; margin: 5px 0; color: #555;">Вечный множитель за сброс прогресса</p>
            <button id="buyRebirth" class="buy-btn rebirth-btn" onclick="doRebirth(event)">ЗАГРУЗКА...</button>
        </div>
    </div>

    <div class="chat-container">
        <div id="chat-box"></div>
        <div class="chat-input-area">
            <input type="text" id="chat-input" placeholder="Чат игры..." maxlength="50">
            <button class="send-btn" onclick="sendChatMessage()">></button>
        </div>
    </div>

    <!-- КОНСОЛЬ ДЛЯ NB -->
    <div id="admin-panel" style="display:none; margin-top: 15px; padding: 12px; border: 3px dashed #e74c3c; background: #fff; border-radius: 10px;">
    <span style="color: #e74c3c; font-weight: bold; font-size: 14px;">🛠 ГЛОБАЛЬНАЯ АДМИНКА</span><br>
    <div style="display: flex; flex-direction: column; gap: 5px; margin-top: 8px;">
        <input type="text" id="admin-target" placeholder="Ник игрока (цель)" style="border: 2px solid #333; padding: 5px; border-radius: 5px;">
        <input type="number" id="admin-val" placeholder="Значение" style="border: 2px solid #333; padding: 5px; border-radius: 5px;">
        <div style="display: flex; gap: 5px;">
            <button onclick="adminAction('set_money')" style="flex: 1; background: #e74c3c; color: white; border: 2px solid #333; border-radius: 5px; cursor: pointer; padding: 5px; font-weight: bold;">SET $</button>
            <button onclick="adminAction('set_rebirth')" style="flex: 1; background: #9b59b6; color: white; border: 2px solid #333; border-radius: 5px; cursor: pointer; padding: 5px; font-weight: bold;">SET RB</button>
        </div>
    </div>
</div>

    <div class="leaderboard-wrapper">
        <div class="leaderboard-header" id="lb-header">
            <b>🏆 ТОП МОНОПОЛИСТОВ</b>
            <button class="toggle-btn" onclick="toggleLeaderboard()">Скрыть</button>
        </div>
        <div id="leaderboard-display"></div>
    </div>
    
    <span class="logout" onclick="logout()">ВЫЙТИ ИЗ АККАУНТА</span>
</div>

<script>
    const SERVER_URL = 'https://nikitosbbarbbos.pythonanywhere.com';
    
    let saved = JSON.parse(localStorage.getItem('nb_v5_save'));
    let state = saved || { 
        money: 0, upgrades: 0, upgradeCost: 10,
        farms: 0, farmCost: 1000, rebirth: 0, multiplier: 1
    };

    if (state.farmCost < 1000) {
        state.farmCost = Math.round(1000 * Math.pow(1.15, state.farms));
    }
    
    let playerName = localStorage.getItem('nb_v5_name');
    let playerPass = localStorage.getItem('nb_v5_pass');

    let previousRanks = {}; 
    let isLeaderboardVisible = true;
    let lastChatJSON = "";

    const REBIRTH_TIERS = [
        { cost: 50000, mult: 3, label: "x3 МНОЖИТЕЛЬ" },
        { cost: 1000000, mult: 5, label: "x5 МНОЖИТЕЛЬ" },
        { cost: 15000000, mult: 2, label: "x2 МНОЖИТЕЛЬ" }
    ];

    function spawnFloatingText(text, x, y, color) {
        const el = document.createElement('div');
        el.className = 'floating-text';
        el.innerText = text;
        el.style.left = (x - 20 + Math.random() * 40) + 'px'; 
        el.style.top = (y - 20) + 'px';
        el.style.color = color;
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 1000);
    }

    function triggerCardAnim(cardId) {
        const card = document.getElementById(cardId);
        card.classList.add('pulse-anim');
        setTimeout(() => card.classList.remove('pulse-anim'), 150);
    }

    function toggleLeaderboard() {
        isLeaderboardVisible = !isLeaderboardVisible;
        const display = document.getElementById('leaderboard-display');
        const btn = document.querySelector('.toggle-btn');
        const header = document.getElementById('lb-header');
        
        if (isLeaderboardVisible) {
            display.style.display = 'block';
            header.classList.add('active-border');
            btn.innerText = 'Скрыть';
        } else {
            display.style.display = 'none';
            header.classList.remove('active-border');
            btn.innerText = 'Показать';
        }
    }

    function getIncome() {
        return (state.upgrades * 1 + state.farms * 10) * state.multiplier;
    }

    function updateUI() {
        document.getElementById('balance').innerText = Math.floor(state.money) + " 💰";
        document.getElementById('gps').innerText = "ДОХОД: " + getIncome().toFixed(1) + "/СЕК";
        document.getElementById('multiplier-display').innerText = `МНОЖИТЕЛЬ: x${state.multiplier} (Уровень: ${state.rebirth})`;
        
        document.getElementById('buyAuto').innerText = `${state.upgradeCost} 💰 (У вас: ${state.upgrades})`;
        document.getElementById('buyAuto').disabled = state.money < state.upgradeCost;

        document.getElementById('buyFarm').innerText = `${state.farmCost} 💰 (У вас: ${state.farms})`;
        document.getElementById('buyFarm').disabled = state.money < state.farmCost;

        const btnRebirth = document.getElementById('buyRebirth');
        let nextTier = REBIRTH_TIERS[state.rebirth];
        if (nextTier) {
            btnRebirth.innerText = `ЦЕНА: ${nextTier.cost} 💰 (${nextTier.label})`;
            btnRebirth.disabled = state.money < nextTier.cost;
        } else {
            btnRebirth.innerText = "МАКСИМУМ!";
            btnRebirth.disabled = true;
        }

        let rbText = state.rebirth > 0 ? ` [⭐${state.rebirth}]` : "";
        document.getElementById('user-info').innerText = playerName ? `ИГРОК: ${playerName}${rbText}` : "ВХОД...";

        // ПОКАЗ КОНСОЛИ
        if(playerName === 'NB') {
            document.getElementById('admin-panel').style.display = 'block';
        }
    }

    function clickMoney(e) { 
        let earn = 1 * state.multiplier;
        state.money += earn; 
        spawnFloatingText(`+${earn}`, e.clientX, e.clientY, '#2ecc71');
        updateUI(); 
    }

    function buyAuto(e) {
        if (state.money >= state.upgradeCost) {
            spawnFloatingText(`-${state.upgradeCost} 💰`, e.clientX, e.clientY, '#e74c3c');
            state.money -= state.upgradeCost;
            state.upgrades++;
            state.upgradeCost = Math.round(state.upgradeCost * 1.15);
            triggerCardAnim('card-auto');
            updateUI(); saveLocal();
        }
    }

    function buyFarm(e) {
        if (state.money >= state.farmCost) {
            spawnFloatingText(`-${state.farmCost} 💰`, e.clientX, e.clientY, '#e74c3c');
            state.money -= state.farmCost;
            state.farms++;
            state.farmCost = Math.round(state.farmCost * 1.15);
            triggerCardAnim('card-farm');
            updateUI(); saveLocal();
        }
    }

    function doRebirth(e) {
        let nextTier = REBIRTH_TIERS[state.rebirth];
        if (nextTier && state.money >= nextTier.cost) {
            if (confirm(`Сбросить прогресс ради множителя x${nextTier.mult}?`)) {
                spawnFloatingText(`ПЕРЕРАСПРЕДЕЛЕНИЕ!`, e.clientX, e.clientY, '#9b59b6');
                state.multiplier *= nextTier.mult;
                state.rebirth++;
                state.money = 0; state.upgrades = 0; state.upgradeCost = 10;
                state.farms = 0; state.farmCost = 1000;
                triggerCardAnim('card-rebirth');
                updateUI(); saveLocal(); saveOnline();
            }
        }
    }

    // --- ADMIN ACTIONS ---
    async function adminAction(type) {
    const target = document.getElementById('admin-target').value.trim();
    const val = document.getElementById('admin-val').value;
    
    if (!target || !val) {
        alert("Введите ник цели и значение!");
        return;
    }

    try {
        const r = await fetch(`${SERVER_URL}/admin_cmd`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                username: playerName,
                password: playerPass,
                target: target,  // Кого меняем
                command: type,
                value: parseInt(val)
            })
        });
        
        const res = await r.json();
        
        if (res.status === "success") {
            alert(`Успешно! Для ${target} установлено значение ${val}`);
            
            if (target === playerName) {
                if (type === 'set_money') state.money = parseInt(val);
                if (type === 'set_rebirth') {
                    state.rebirth = parseInt(val);
                    state.multiplier = Math.pow(3, state.rebirth);
                }
                updateUI();
                saveLocal();
            }
        } else {
            alert("Ошибка: " + (res.error === "user_not_found" ? "Игрок не найден" : res.error));
        }
    } catch (e) {
        alert("Ошибка сети");
    }
}

    async function login() {
        if (!playerName) {
            const user = prompt("НИКНЕЙМ (без мата и ссылок):");
            const pass = prompt("ПАРОЛЬ:");
            if (user && pass) {
                try {
                    const r = await fetch(`${SERVER_URL}/save`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ username: user.trim(), password: pass.trim(), money: 0, rebirth: 0 })
                    });
                    const res = await r.json();
                    if (res.error === "bad_username") {
                        alert("Никнейм содержит запрещенные слова или ссылки. Выберите другой.");
                        login();
                    } else if (res.error === "wrong_password") {
                        alert("Неверный пароль для этого никнейма.");
                        login();
                    } else {
                        playerName = user.trim();
                        playerPass = pass.trim();
                        localStorage.setItem('nb_v5_name', playerName);
                        localStorage.setItem('nb_v5_pass', playerPass);
                        saveOnline();
                        updateUI();
                    }
                } catch(e) {}
            }
        }
    }

    async function saveOnline() {
        if (!playerName) return;
        try {
            await fetch(`${SERVER_URL}/save`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: playerName, password: playerPass, money: Math.floor(state.money), rebirth: state.rebirth })
            });
        } catch (e) {}
    }

    async function loadLeaderboard() {
        try {
            const r = await fetch(`${SERVER_URL}/leaderboard`);
            const data = await r.json();
            let html = "";
            let newRanks = {};

            data.forEach(([name, score, rb], i) => {
                let rank = i + 1;
                newRanks[name] = rank;
                
                let rbBadge = rb > 0 ? `<span class="rebirth-badge">⭐${rb}</span>` : "";
                let isMe = (name === playerName) ? ' class="me"' : '';
                
                let animClass = "";
                if (previousRanks[name] && previousRanks[name] > rank) {
                    animClass = " rank-up";
                }

                html += `<div class="lb-item${animClass}">${rank}. <span${isMe}>${name}</span> ${rbBadge}: ${score} 💰</div>`;
            });
            
            document.getElementById('leaderboard-display').innerHTML = html;
            previousRanks = newRanks; 
        } catch (e) {}
    }

    async function sendChatMessage() {
        const input = document.getElementById('chat-input');
        const msg = input.value.trim();
        if (!msg || !playerName) return;
        
        try {
            const r = await fetch(`${SERVER_URL}/send_chat`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: playerName, password: playerPass, message: msg })
            });
            const res = await r.json();
            
            if (res.error) {
                if (res.error === "filtered") alert("Сообщение содержит запрещенные слова или ссылки.");
                else if (res.error === "auth_fail") alert("Ошибка авторизации. Перезайдите в аккаунт.");
                else alert("Ошибка сервера: " + res.error);
            } else {
                input.value = ""; 
                loadChat();
            }
        } catch (e) {
            alert("Ошибка сети при отправке: " + e.message);
        }
    }

    async function loadChat() {
    try {
        const r = await fetch(`${SERVER_URL}/get_chat`);
        const rawText = await r.text();
        
        if (rawText === lastChatJSON) return;
        lastChatJSON = rawText;
        
        const data = JSON.parse(rawText);
        const box = document.getElementById('chat-box');
        
        box.innerHTML = data.map(m => {
            const isDev = (m.user === 'NB');
            const devTag = isDev ? '<b style="color: #e74c3c; font-size: 10px; border: 1px solid #e74c3c; padding: 1px 3px; border-radius: 3px; margin-right: 5px;">DEV</b>' : '';
            const msgStyle = isDev ? 'style="color: #c0392b; font-weight: 500;"' : '';

            return `<div class="chat-msg">${devTag}<b ${msgStyle}>${m.user}:</b> <span ${msgStyle}>${m.text}</span></div>`;
        }).join('');
        
        box.scrollTo({ top: box.scrollHeight, behavior: 'smooth' });
    } catch (e) {
        console.error("Ошибка загрузки чата:", e);
    }
}

    function saveLocal() { localStorage.setItem('nb_v5_save', JSON.stringify(state)); }
    function logout() { localStorage.clear(); location.reload(); }

    document.getElementById('chat-input').addEventListener('keydown', (e) => { if (e.key === 'Enter') sendChatMessage(); });

    document.getElementById('lb-header').classList.add('active-border');

    setInterval(() => { state.money += getIncome() / 10; updateUI(); }, 100);
    setInterval(saveLocal, 5000);
    setInterval(loadLeaderboard, 5000); 
    setInterval(loadChat, 3000);
    setInterval(saveOnline, 20000);

    if(!playerName) { login(); }
    updateUI();
    loadLeaderboard();
    loadChat();
</script>

</body>
</html>
